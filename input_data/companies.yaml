# Keep up to date by running: python scripts/sync_companies_from_sheet.py
#
# source_type values:
#   personio   — uses Personio JSON API (no auth required)
#   workable   — uses Workable JSON API (no auth required)
#   recruitee  — uses Recruitee JSON API (no auth required)
#   html       — generic page fetch + LLM extraction
#   skip       — JS-only or inaccessible page; excluded from scraping

